services:
  mongo:
    image: mongo
    container_name: mongo
    ports:
      - "27018:27017"
    volumes:
      - mongo_data:/data/db

  backend:
    build: ./backend
    container_name: backend
    restart: unless-stopped
    ports:
      - "5000:5000"
    depends_on:
      - mongo
    environment:
      - MONGO_URI=mongodb://mongo:27017/hostelDB

  frontend:
    build: ./frontend
    container_name: frontend
    ports:
      - "3000:3000"
    depends_on:
      - backend

  api-gateway:
    build: ./services/api-gateway
    container_name: api-gateway
    ports:
      - "4000:4000"
    depends_on:
      - backend
    environment:
      - PORT=4000
      - ALERTS_SERVICE_URL=http://backend:5000
      - ANALYTICS_SERVICE_URL=http://backend:5000
      - ROOMS_SERVICE_URL=http://backend:5000
      - DEVICES_SERVICE_URL=http://backend:5000

volumes:
  mongo_data:
